# ORPilot configuration file
# CLI options take precedence over values here.
# This file is auto-discovered when running `orpilot run` from the ORPilot directory.

provider        = "openai"
model           = "gpt-5-mini"

solver          = "pulp"
time_limit      = 300            # seconds
show_solver_log = false
verbose         = false
max_retries     = 3

data_dir        = "data"
output_dir      = "output"

api_key       = ""  # prefer OPENAI_API_KEY env var instead
#base_url      = "https://api.deepseek.com"  # custom API endpoint, e.g. https://api.deepseek.com

generate_ir = false   # set to true to generate IR after each successful solve
temperature = 1     # LLM sampling temperature: 0.0 = deterministic, 1.0 = default creative
